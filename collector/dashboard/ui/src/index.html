<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spyglass</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e4ed;
      --muted: #6b7280;
      --accent: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
    }
    body { background: var(--bg); color: var(--text); min-height: 100vh; }
    nav {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    nav .logo { font-weight: 700; font-size: 1rem; letter-spacing: -0.02em; color: var(--accent); }
    nav a { color: var(--muted); text-decoration: none; padding: 0.25rem 0.5rem; border-radius: 4px; }
    nav a.active, nav a:hover { color: var(--text); background: var(--border); }
    main { padding: 1.5rem; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .toolbar select, .toolbar input {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 0.35rem 0.6rem; border-radius: 4px; font: inherit;
    }
    .toolbar button {
      background: var(--accent); border: none; color: #fff;
      padding: 0.35rem 0.75rem; border-radius: 4px; cursor: pointer; font: inherit;
    }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: var(--muted); padding: 0.4rem 0.75rem; font-weight: 500; border-bottom: 1px solid var(--border); }
    td { padding: 0.4rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:hover td { background: var(--surface); }
    .badge {
      display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-event   { background: #1d3a6e; color: #93c5fd; }
    .badge-pageview { background: #1a3a2a; color: #86efac; }
    .badge-error   { background: #3a1a1a; color: #fca5a5; }
    .badge-network { background: #2a2a1a; color: #fde68a; }
    .badge-bug_report { background: #3a1a3a; color: #e9d5ff; }
    .empty { color: var(--muted); padding: 2rem 0.75rem; }
    .props { color: var(--muted); font-size: 0.85em; word-break: break-all; }
    .ts { color: var(--muted); white-space: nowrap; }
    #app { max-width: 1400px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
