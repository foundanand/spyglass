<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spyglass</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e4ed;
      --muted: #6b7280;
      --accent: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
    }
    body { background: var(--bg); color: var(--text); min-height: 100vh; }
    nav {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    nav .logo { font-weight: 700; font-size: 1rem; letter-spacing: -0.02em; color: var(--accent); }
    nav a { color: var(--muted); text-decoration: none; padding: 0.25rem 0.5rem; border-radius: 4px; }
    nav a.active, nav a:hover { color: var(--text); background: var(--border); }
    main { padding: 1.5rem; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    .toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .toolbar select, .toolbar input {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 0.35rem 0.6rem; border-radius: 4px; font: inherit;
    }
    .toolbar button {
      background: var(--accent); border: none; color: #fff;
      padding: 0.35rem 0.75rem; border-radius: 4px; cursor: pointer; font: inherit;
    }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: var(--muted); padding: 0.4rem 0.75rem; font-weight: 500; border-bottom: 1px solid var(--border); }
    td { padding: 0.4rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:hover td { background: var(--surface); }
    .badge {
      display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-event   { background: #1d3a6e; color: #93c5fd; }
    .badge-pageview { background: #1a3a2a; color: #86efac; }
    .badge-error   { background: #3a1a1a; color: #fca5a5; }
    .badge-network { background: #2a2a1a; color: #fde68a; }
    .badge-bug_report { background: #3a1a3a; color: #e9d5ff; }
    .empty { color: var(--muted); padding: 2rem 0.75rem; }
    .props { color: var(--muted); font-size: 0.85em; word-break: break-all; }
    .ts { color: var(--muted); white-space: nowrap; }
    #app { max-width: 1400px; margin: 0 auto; }
    /* Replay view */
    .replay-root { display: flex; gap: 0; height: calc(100vh - 110px); overflow: hidden; }
    .sessions-sidebar {
      width: 280px; flex-shrink: 0; overflow-y: auto;
      border-right: 1px solid var(--border); padding: 1rem;
    }
    .sessions-sidebar h2 { margin-bottom: 0.75rem; }
    .session-item {
      padding: 0.5rem 0.6rem; border-radius: 4px; cursor: pointer;
      margin-bottom: 2px; display: flex; flex-direction: column; gap: 2px;
    }
    .session-item:hover { background: var(--border); }
    .session-item.active { background: #1d2a4a; }
    .session-user { font-weight: 600; }
    .session-meta { color: var(--muted); font-size: 0.8em; }
    .session-chunks { color: var(--muted); font-size: 0.75em; }
    .replay-main { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .replay-header { display: flex; align-items: baseline; gap: 1rem; }
    .replay-header strong { font-size: 0.95rem; }
    .player-container { width: 100%; min-height: 400px; background: #000; border-radius: 4px; overflow: hidden; }
    .console-pane { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .console-pane h3 { font-size: 0.8rem; font-weight: 600; padding: 0.4rem 0.75rem; background: var(--surface); border-bottom: 1px solid var(--border); }
    .console-lines { max-height: 200px; overflow-y: auto; }
    .console-line { display: flex; gap: 0.5rem; padding: 0.2rem 0.75rem; font-size: 0.8em; border-bottom: 1px solid var(--border); }
    .console-line:last-child { border-bottom: none; }
    .console-ts { color: var(--muted); white-space: nowrap; }
    .console-level { font-weight: 600; width: 3rem; flex-shrink: 0; }
    .level-error .console-level { color: var(--red); }
    .level-warn .console-level { color: var(--yellow); }
    .level-log .console-level, .level-info .console-level { color: var(--muted); }
    .console-msg { word-break: break-all; }
    /* User Timeline */
    .timeline-root { display: flex; gap: 0; height: calc(100vh - 110px); overflow: hidden; }
    .timeline-sidebar {
      width: 260px; flex-shrink: 0; overflow-y: auto;
      border-right: 1px solid var(--border); padding: 1rem;
    }
    .timeline-user-item {
      padding: 0.5rem 0.6rem; border-radius: 4px; cursor: pointer;
      margin-bottom: 2px; display: flex; flex-direction: column; gap: 2px;
    }
    .timeline-user-item:hover { background: var(--border); }
    .timeline-user-item.active { background: #1d2a4a; }
    .tl-user { font-weight: 600; }
    .tl-meta { color: var(--muted); font-size: 0.8em; }
    .timeline-main { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .tl-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.5rem; }
    .tl-error { color: var(--red); margin-bottom: 0.5rem; }
    .tl-session { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 1rem; }
    .tl-session-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.4rem 0.75rem; background: var(--surface);
      border-bottom: 1px solid var(--border); font-size: 0.8em;
    }
    .tl-session-id { font-family: monospace; color: var(--muted); }
    .tl-err-badge {
      margin-left: auto; padding: 0.1rem 0.4rem; border-radius: 3px;
      background: #3a1a1a; color: #fca5a5; font-size: 0.75rem; font-weight: 600;
    }
    .tl-table { width: 100%; border-collapse: collapse; }
    .tl-table td { padding: 0.3rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 0.85em; }
    .tl-table tr:last-child td { border-bottom: none; }
    .tl-table tr:hover td { background: rgba(255,255,255,0.02); }
    .tl-ts { white-space: nowrap; width: 6rem; }
    .tl-name { word-break: break-all; }
    .tl-url { color: var(--muted); font-size: 0.8em; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* Row highlight by type */
    .row-error td:first-child { border-left: 3px solid var(--red); }
    .row-network td:first-child { border-left: 3px solid var(--yellow); }
    .row-pageview td:first-child { border-left: 3px solid var(--green); }
    .row-event td:first-child { border-left: 3px solid var(--accent); }
    .row-bug td:first-child { border-left: 3px solid #a855f7; }
    /* Network detail inline */
    .network-detail { margin-left: 0.5rem; display: inline-flex; gap: 0.35rem; font-size: 0.85em; }
    .http-method { font-weight: 600; color: var(--accent); }
    .http-status { font-weight: 600; }
    .status-ok { color: var(--green); }
    .status-warn { color: var(--yellow); }
    .status-error { color: var(--red); }
    .http-dur { color: var(--muted); }
    /* Error detail inline */
    .error-detail { display: block; margin-top: 0.2rem; }
    .stack-toggle {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font: inherit; font-size: 0.75rem; padding: 0.1rem 0.35rem; border-radius: 3px; cursor: pointer;
    }
    .stack-toggle:hover { color: var(--text); border-color: var(--muted); }
    .stack-trace {
      margin-top: 0.35rem; padding: 0.5rem; background: var(--surface);
      border-radius: 3px; font-size: 0.75rem; color: var(--muted);
      white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto;
    }
    /* Errors view */
    .err-msg { max-width: 500px; }
    .err-name { font-weight: 500; }
    /* Shared */
    .muted { color: var(--muted); }
    /* Clickable rows */
    .row-clickable { cursor: pointer; }
    .row-clickable:hover td { background: #1d2a4a !important; }
    .row-bug_report td:first-child { border-left: 3px solid #a855f7; }
    .severity-inline {
      display: inline-block; margin-left: 0.4rem;
      padding: 0.1rem 0.35rem; border-radius: 3px;
      background: #3a1a3a; color: #e9d5ff; font-size: 0.7rem;
    }
    /* Incident view */
    .back-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font: inherit; font-size: 0.8rem; padding: 0.25rem 0.65rem;
      border-radius: 4px; cursor: pointer; margin-bottom: 1.25rem; display: inline-block;
    }
    .back-btn:hover { color: var(--text); border-color: var(--muted); }
    .incident-root { max-width: 1100px; }
    .incident-header {
      padding: 1rem; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 1.5rem;
    }
    .incident-title { font-size: 1.05rem; font-weight: 600; margin: 0.5rem 0 0.4rem; color: var(--text); }
    .incident-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
    .severity-badge {
      display: inline-block; margin-top: 0.4rem;
      padding: 0.15rem 0.5rem; border-radius: 4px;
      background: #3a1a3a; color: #e9d5ff; font-size: 0.75rem; font-weight: 600;
    }
    .stack-block { margin-top: 0.5rem; }
    .incident-section { margin-bottom: 1.75rem; }
    .incident-section h3 {
      font-size: 0.85rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 0.6rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    .count { font-weight: 400; color: var(--muted); }
    /* Network waterfall */
    .network-table { width: 100%; border-collapse: collapse; }
    .network-table th { text-align: left; color: var(--muted); padding: 0.35rem 0.6rem; font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .network-table td { padding: 0.35rem 0.6rem; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 0.82rem; }
    .network-table tr:hover td { background: var(--surface); }
    .waterfall-bar { height: 10px; background: var(--accent); border-radius: 2px; }
    .status-badge { padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.75rem; font-weight: 600; }
    .status-2xx { background: #1a3a2a; color: #86efac; }
    .status-3xx { background: #2a2a1a; color: #fde68a; }
    .status-4xx { background: #3a1a1a; color: #fca5a5; }
    .status-5xx { background: #4a1a1a; color: #f87171; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
