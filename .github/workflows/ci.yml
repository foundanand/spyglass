name: CI

# Runs on every push and pull request to master. With branch protection
# requiring PRs into master, wiring "collector" as a required status check
# means the air-gap guarantee (collector/airgap_test.go) is enforced before
# anything can merge — no accidental outbound call or CDN asset gets in.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  collector:
    name: collector (build + air-gap guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: collector/go.sum
      # The dashboard bundle (collector/dashboard/ui/dist) is a build artifact,
      # not committed, and is consumed by `//go:embed ui/dist`. It must exist
      # before any go command, or the embed fails to compile. Building it here
      # also lets TestNoExternalAssetsInDashboard run for real instead of skipping.
      - name: build embedded dashboard
        working-directory: collector/dashboard/ui
        run: npm install --no-audit --no-fund && npm run build
      - name: go vet
        working-directory: collector
        run: go vet ./...
      - name: go test (includes air-gap guard)
        working-directory: collector
        run: go test ./...
      - name: build static binary (CGO off, pure-Go SQLite)
        working-directory: collector
        run: CGO_ENABLED=0 go build -o /dev/null .

  sdk:
    name: sdk (tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No `version:` here — pnpm/action-setup reads it from package.json's
      # `packageManager` field; specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: typecheck
        run: pnpm --filter @spyglass/sdk typecheck
      - name: unit tests
        run: pnpm --filter @spyglass/sdk test
